name: Release Droid - Release On Maven Central

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: |
            11
            17
          cache: "maven"
          server-id: maven-central-portal
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
        id: go

      - name: Publish to Central Repository
        run: |
          mvn --batch-mode -Dgpg.skip=false -DskipTests clean deploy \
              -Dcentral-publishing.deploymentName="Auto release of repo ${{ github.repository }} using release_droid_release_on_maven_central.yml" \
              -Dcentral-publishing.autoPublish=true
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_PORTAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PORTAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
