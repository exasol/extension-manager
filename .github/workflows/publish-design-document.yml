name: Publish design document

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install Tools
        run: |
          pip install pandoc-plantuml-filter
          sudo apt-get install -y pandoc plantuml
      - name: Generate Doc
        run: |
          mkdir gh-pages
          cd gh-pages
          pandoc ../doc/design.md -o design.html --filter pandoc-plantuml
          pandoc ../doc/system_requirements.md -o system_requirements.html --filter pandoc-plantuml
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./gh-pages/

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
